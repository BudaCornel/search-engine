
services:
  postgres:
    image: postgres:16-alpine
    container_name: localsearch-db
    environment:
      POSTGRES_DB: localsearch
      POSTGRES_USER: localsearch
      POSTGRES_PASSWORD: localsearch
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: